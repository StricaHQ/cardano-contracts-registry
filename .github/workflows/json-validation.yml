name: JSON Validation

on:
  pull_request:
    branches:
      - master

jobs:
  validate:
    name: Validate Project JSON
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Validate JSON files
        run: npm run validate
